services:
  muhasebe:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://0.0.0.0:8080
      # PostgreSQL bağlantısı — Dokploy panelinden ENV var olarak override edilir.
      # URI veya klasik (Host=...;Port=...;...) format çalışır.
      ConnectionStrings__DefaultConnection: ${DATABASE_URL:-}
    volumes:
      # Yüklenen dekont dosyaları için
      - muhasebe-data:/app/App_Data
      - muhasebe-keys:/root/.aspnet/DataProtection-Keys
    networks:
      - dokploy-network
    expose:
      - "8080"
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.services.muhasebe.loadbalancer.server.port=8080

networks:
  dokploy-network:
    external: true

volumes:
  muhasebe-data:
  muhasebe-keys:
